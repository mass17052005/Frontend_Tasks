<!DOCTYPE html>
<html>
<head>
  <title>Step Form UI</title>
  <link rel="stylesheet" href="./tank5.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <div class="sidebar">
    <div class="step active">
      <span class="circle">1</span>
      <div>
        <p>STEP 1</p>
        <h4>YOUR INFO</h4>
      </div>
    </div>

    <div class="step">
      <span class="circle">2</span>
      <div>
        <p>STEP 2</p>
        <h4>SELECT PLAN</h4>
      </div>
    </div>

    <div class="step">
      <span class="circle">3</span>
      <div>
        <p>STEP 3</p>
        <h4>ADD-ONS</h4>
      </div>
    </div>

    <div class="step">
      <span class="circle">4</span>
      <div>
        <p>STEP 4</p>
        <h4>SUMMARY</h4>
      </div>
    </div>
  </div>

  <div class="form-box">
    <h2>Personal info</h2>
    <p class="subtitle">
      Please provide your name, email address, and phone number.
    </p>

    <label>Name</label>
    <input type="text" placeholder="e.g. prudhvi">

    <label>Email Address</label>
    <input type="email" placeholder="e.g. prudhvi@gmail.com">

    <label>Phone Number</label>
    <input type="text" placeholder="e.g. +91-9577296333">

    <button class="next-btn">Next Step</button>
  </div>

</div>

</body>
</html>
