<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservation Form</title>

<style>
    body {
        font-family: serif;
        margin: 0;
    }

    
    .top-text {
        text-align: right;
        padding: 5px 40px;
        font-style: italic;
    }

    .highlight {
        background-color: yellow;
    }

   
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 40px;
        border-top: 1px solid gray;
        border-bottom: 1px solid gray;
    }

    .nav-links {
        display: flex;
        gap: 40px;
    }

    .nav-links a {
        text-decoration: none;
        color: blue;
        font-weight: bold;
    }

    .search {
        width: 150px;
        height: 25px;
        border: 1px solid gray;
    }

    h2 {
        margin: 20px 30px;
    }

   
   
fieldset {
    margin: 20px;
    padding: 30px;
    border: 1px solid gray;

    display: flex;
    justify-content: center;   /
}
    legend {
        font-size: 26px;
        font-weight: bold;
    }

    /* FORM CONTENT */
    .form-box {
        width: 400px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        font-weight: bold;
    }

    input, textarea {
        border: 1px solid gray;
        padding: 5px;
    }

    .row {
        display: flex;
        gap: 10px;
    }

    .date-row {
        display: flex;
        gap: 40px;
    }

    textarea {
        width: 200px;
        height: 60px;
    }

    button {
        margin-top: 10px;
    }

</style>
</head>

<body>

<div class="top-text">
    These are the best places to travel <span class="highlight">This Summer</span>
</div>

<div class="navbar">
    <div><b>lonely Planet</b></div>

    <div class="nav-links">
        <a href="#">DESTINATIONS</a>
        <a href="#">BOOK</a>
        <a href="#">TRIPS</a>
        <a href="#">STORIES</a>
    </div>

    <input class="search" type="text">
</div>

<form>

<fieldset>
<legend>Reservation Information Form</legend>

<div class="form-box">

    <div class="form-group">
        <label>NAME:*</label><br>
        <div class="row">
            <input type="text" placeholder="First Name">
            <input type="text" placeholder="Last Name">
        </div>
    </div>

  
    <div class="form-group">
        <label>Phone Number:*</label><br>
        <input type="text" placeholder="Ex-1234567890">
    </div>

   
    <div class="form-group">
        <label>Email:*</label><br>
        <input type="email" placeholder="Enter Mail Id">
    </div>

  
    <div class="form-group date-row">
        <div>
            <label>Check Date:*</label><br>
            <input type="date">
        </div>

        <div>
            <label>Check Out Date:*</label><br>
            <input type="date">
        </div>
    </div>

    <div class="form-group">
        <label>Special Requirements:</label><br>
        <textarea></textarea>
    </div>

    <button type="submit">Submit</button>

</div>

</fieldset>

</form>

</body>
</html>
