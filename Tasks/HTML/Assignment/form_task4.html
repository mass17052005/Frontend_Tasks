<!DOCTYPE html>
<html>
<head>
  <title>Product Card</title>

  <style>
    body {
      background: #f3eae3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .card {
      display: flex;
      width: 600px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .left {
      width: 50%;
    }

    .left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .right {
      padding: 20px;
      width: 50%;
    }

    .tag {
      letter-spacing: 3px;
      color: gray;
    }

    h2 {
      margin: 10px 0;
    }

    .desc {
      color: gray;
      font-size: 14px;
    }

    .price {
      margin: 15px 0;
    }

    .new {
      color: green;
      font-size: 24px;
      font-weight: bold;
    }

    .old {
      text-decoration: line-through;
      margin-left: 10px;
      color: gray;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }
  </style>

</head>
<body>

<div class="card">
  <div class="left">
    <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f" alt="perfume">
  </div>

  <div class="right">
    <p class="tag">PERFUME</p>
    <h2>Gabrielle Essence Eau De Parfum</h2>

    <p class="desc">
      A floral, solar and voluptuous interpretation composed by Olivier Polge.
    </p>

    <div class="price">
      <span class="new">$149.99</span>
      <span class="old">$169.99</span>
    </div>

    <button onclick="addToCart()">Add to Cart</button>
  </div>
</div>

<script>
  function addToCart(){
    alert("Product added to cart!");
  }
</script>

</body>
</html>
